apiVersion: v1
kind: Namespace
metadata:
  name: agent-academy
---
apiVersion: v1
kind: Secret
metadata:
  name: catalog-surrealdb-secret
  namespace: agent-academy
type: Opaque
stringData:
  SURREALDB_USERNAME: "<set-at-deploy-time>"
  SURREALDB_PASSWORD: "<set-at-deploy-time>"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-config
  namespace: agent-academy
data:
  PORT: "4001"
  HOST: "0.0.0.0"
  AUDIT_SINK: console
  SURREALDB_ENDPOINT: "http://surrealdb.fabric.svc.cluster.local:8000"
  SURREALDB_NAMESPACE: agennext
  SURREALDB_DATABASE: academy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: agent-academy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: ghcr.io/agennext/agent-academy-catalog:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: catalog-config
            - secretRef:
                name: catalog-surrealdb-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: agent-academy
spec:
  selector:
    app: catalog-service
  ports:
    - name: http
      port: 80
      targetPort: 4001
