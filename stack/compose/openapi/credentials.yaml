openapi: 3.1.0
info:
  title: Agent Academy Credential API
  version: 0.1.0
  description: MVP credential API for SFIA, Open Badges, Verifiable Credentials, DID, and wallet flows.
servers:
  - url: /api/credentials
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Credential API is healthy
  /api/v1/credential-definitions:
    get:
      summary: List credential definitions
      responses:
        '200':
          description: Credential definitions
  /api/v1/credentials/issue:
    post:
      summary: Issue development credential
      responses:
        '201':
          description: Credential issued
  /api/v1/credentials/verify:
    post:
      summary: Verify credential
      responses:
        '200':
          description: Verification decision
  /api/v1/wallets/link:
    post:
      summary: Link wallet
      responses:
        '201':
          description: Wallet linked
