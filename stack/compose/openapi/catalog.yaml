openapi: 3.1.0
info:
  title: Agent Academy Catalog API
  version: 0.1.0
  description: MVP catalog API exposing schema.org Course resources.
servers:
  - url: /api/catalog
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Catalog API is healthy
  /api/v1/courses:
    get:
      summary: List courses
      responses:
        '200':
          description: Course list
    post:
      summary: Create course
      responses:
        '201':
          description: Course created
  /api/v1/courses/{identifier}:
    get:
      summary: Get course
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Course found
    patch:
      summary: Update course
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Course updated
