name: Platform API

on:
  pull_request:
    paths:
      - 'services/platform-api/**'
      - 'platform/**'
      - '.github/workflows/platform-api.yml'
  push:
    branches:
      - main
    paths:
      - 'services/platform-api/**'
      - 'platform/**'
      - '.github/workflows/platform-api.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/platform-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  container:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/platform-api
          push: true
          tags: |
            ghcr.io/agennext/agent-academy-platform-api:latest
            ghcr.io/agennext/agent-academy-platform-api:${{ github.sha }}
