name: Deploy OVH VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Platform API image tag to deploy
        required: false
        default: latest

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  PLATFORM_API_IMAGE: ghcr.io/agennext/agent-academy-platform-api

jobs:
  deploy:
    name: Deploy to OVH VPS
    runs-on: ubuntu-latest
    environment: ovh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.OVH_SSH_PRIVATE_KEY }}" > ~/.ssh/ovh_key
          chmod 600 ~/.ssh/ovh_key
          ssh-keyscan -H "${{ secrets.OVH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment bundle
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/ovh_key -p ${{ secrets.OVH_SSH_PORT || 22 }}" \
            platform services/platform-api \
            "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:${{ vars.OVH_DEPLOY_DIR || '/opt/agent-academy' }}/"

      - name: Deploy platform
        run: |
          ssh -i ~/.ssh/ovh_key -p "${{ secrets.OVH_SSH_PORT || 22 }}" "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}" << 'EOF'
          set -euo pipefail
          cd "${OVH_DEPLOY_DIR:-/opt/agent-academy}"
          export SURREAL_USER="${SURREAL_USER}"
          export SURREAL_PASS="${SURREAL_PASS}"
          export PLATFORM_API_IMAGE="${PLATFORM_API_IMAGE}:${IMAGE_TAG}"
          chmod +x platform/scripts/*.sh
          ./platform/scripts/bootstrap.sh
          ./platform/scripts/init-surreal.sh
          ./platform/scripts/smoke-test.sh
          EOF
        env:
          OVH_DEPLOY_DIR: ${{ vars.OVH_DEPLOY_DIR || '/opt/agent-academy' }}
          SURREAL_USER: ${{ secrets.SURREAL_USER }}
          SURREAL_PASS: ${{ secrets.SURREAL_PASS }}
          PLATFORM_API_IMAGE: ${{ env.PLATFORM_API_IMAGE }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
