apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-api
  namespace: agent-academy
  labels:
    app.kubernetes.io/name: platform-api
    app.kubernetes.io/part-of: agent-academy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-api-config
  namespace: agent-academy
data:
  PORT: "4000"
  HOST: "0.0.0.0"
  SURREALDB_ENDPOINT: "http://surrealdb.agent-academy.svc.cluster.local:8000"
  SURREALDB_NAMESPACE: "agennext"
  SURREALDB_DATABASE: "academy"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: agent-academy
  labels:
    app.kubernetes.io/name: platform-api
    app.kubernetes.io/part-of: agent-academy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-api
        app.kubernetes.io/part-of: agent-academy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "4000"
    spec:
      serviceAccountName: platform-api
      containers:
        - name: platform-api
          image: ghcr.io/agennext/agent-academy-platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - configMapRef:
                name: platform-api-config
            - secretRef:
                name: surrealdb-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: agent-academy
  labels:
    app.kubernetes.io/name: platform-api
    app.kubernetes.io/part-of: agent-academy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: platform-api
  ports:
    - name: http
      port: 80
      targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-api
  namespace: agent-academy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-api
  namespace: agent-academy
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-api
