apiVersion: v1
kind: Secret
metadata:
  name: surrealdb-secret
  namespace: agent-academy
type: Opaque
stringData:
  SURREAL_USER: "<set-at-deploy-time>"
  SURREAL_PASS: "<set-at-deploy-time>"
---
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: agent-academy
  labels:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/part-of: agent-academy
spec:
  selector:
    app.kubernetes.io/name: surrealdb
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: surrealdb
  namespace: agent-academy
spec:
  serviceName: surrealdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: surrealdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: surrealdb
        app.kubernetes.io/part-of: agent-academy
    spec:
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:latest
          args:
            - start
            - --log
            - info
            - --user
            - $(SURREAL_USER)
            - --pass
            - $(SURREAL_PASS)
            - rocksdb:/data/academy.db
          envFrom:
            - secretRef:
                name: surrealdb-secret
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: surrealdb-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: surrealdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
