openapi: 3.1.0
info:
  title: Agent Academy Platform API
  version: 0.1.0
  description: Kubernetes-native API for Agent Academy primitives and relationships.
servers:
  - url: /api
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: Healthy }
  /ready:
    get:
      summary: Readiness check
      responses:
        '200': { description: Ready }
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200': { description: Metrics }
  /api/v1/primitives/catalog:
    get:
      summary: Get primitive catalog
      responses:
        '200': { description: Primitive catalog }
  /api/v1/primitives:
    get:
      summary: List primitives
      parameters:
        - { name: kind, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: q, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
      responses:
        '200': { description: Primitive list }
    post:
      summary: Create primitive
      responses:
        '201': { description: Primitive created }
  /api/v1/primitives/{identifier}:
    get:
      summary: Get primitive
      parameters:
        - { name: identifier, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Primitive found }
        '404': { description: Primitive not found }
    patch:
      summary: Patch primitive
      parameters:
        - { name: identifier, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Primitive updated }
  /api/v1/relationships:
    get:
      summary: List relationships
      parameters:
        - { name: primitive, in: query, schema: { type: string } }
      responses:
        '200': { description: Relationship list }
    post:
      summary: Create relationship
      responses:
        '201': { description: Relationship created }
components:
  schemas:
    Primitive:
      type: object
      required: [kind, identifier, status, version, data]
      properties:
        kind:
          type: string
          enum: [Identity, Account, Organization, Capability, Skill, Technology, JobProfile, LearningPath, Resource, Artifact, Evidence, Assessment, Credential, Wallet]
        identifier: { type: string }
        name: { type: string }
        description: { type: string }
        status:
          type: string
          enum: [draft, active, archived, deprecated, suspended, revoked]
        version: { type: string }
        data: { type: object }
    Relationship:
      type: object
      required: [from, to, predicate]
      properties:
        from: { type: string }
        to: { type: string }
        predicate: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }
