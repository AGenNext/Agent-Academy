openapi: 3.1.0
info:
  title: Agent Academy Ontology API
  version: 0.1.0
  description: Release-ready API surface for ontology, resources, profiles, and graph relationships.
paths:
  /api/v1/ontology:
    get:
      summary: Get ontology metadata
      responses:
        '200': { description: Ontology metadata }
  /api/v1/ontology/terms:
    get:
      summary: List ontology terms
      responses:
        '200': { description: Ontology terms }
  /api/v1/resources:
    get:
      summary: List resources
      responses:
        '200': { description: Resource list }
    post:
      summary: Create resource
      responses:
        '201': { description: Resource created }
  /api/v1/resources/{identifier}:
    get:
      summary: Get resource
      parameters:
        - name: identifier
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Resource }
  /api/v1/profiles:
    get:
      summary: List profiles
      responses:
        '200': { description: Profile list }
    post:
      summary: Create profile
      responses:
        '201': { description: Profile created }
  /api/v1/graph/resources:
    get:
      summary: List resource graph edges
      responses:
        '200': { description: Resource graph }
    post:
      summary: Create resource edge
      responses:
        '201': { description: Edge created }
components:
  schemas:
    Resource:
      type: object
      required: [identifier, kind, name, version, status, visibility]
      properties:
        identifier: { type: string }
        kind: { type: string }
        name: { type: string }
        description: { type: string }
        version: { type: string }
        status: { type: string }
        owner: { type: string }
        tenantId: { type: string }
        workspaceId: { type: string }
        visibility: { type: string }
        tags: { type: array, items: { type: string } }
        data: { type: object }
    Profile:
      type: object
      required: [identifier, profileType, subject, name, status, version]
      properties:
        identifier: { type: string }
        profileType: { type: string }
        subject: { type: string }
        name: { type: string }
        status: { type: string }
        version: { type: string }
        components: { type: array, items: { type: string } }
        data: { type: object }
